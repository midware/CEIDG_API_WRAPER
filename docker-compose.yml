services:
  postgres:
    image: postgres:17
    container_name: ceidg-mirror-postgres
    environment:
      POSTGRES_DB: ceidg_mirror
      POSTGRES_USER: ceidg
      POSTGRES_PASSWORD: ceidg_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ceidg_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceidg -d ceidg_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceidg-mirror-worker
    profiles:
      - worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Production
      CeidgApi__BaseUrl: https://dane.biznes.gov.pl/api/ceidg/v3/
      CeidgApi__ReportsBaseUrl: https://dane.biznes.gov.pl/raporty/
      CeidgApi__JwtToken: ${CEIDG_JWT_TOKEN:-}
      CeidgApi__RequestLimit: 50
      CeidgApi__WindowSeconds: 180
      CeidgApi__HourlyRequestLimit: 1000
      CeidgApi__HourlyWindowSeconds: 3600
      CeidgApi__MinimumRequestIntervalSeconds: 4
      CeidgApi__RequestTimeoutSeconds: 300
      Postgres__ConnectionString: ${POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=ceidg_mirror;Username=ceidg;Password=ceidg_dev_password}
      KrsImport__Enabled: ${KRS_IMPORT_ENABLED:-true}
      KrsImport__Source: ${KRS_IMPORT_SOURCE:-Bulletin}
      KrsImport__BaseUrl: https://api-krs.ms.gov.pl/
      KrsImport__Register: ${KRS_IMPORT_REGISTER:-P}
      KrsImport__Resume: "true"
      KrsImport__MaxItems: ${KRS_IMPORT_MAX_ITEMS:-0}
      KrsImport__RequestLimit: ${KRS_IMPORT_REQUEST_LIMIT:-30}
      KrsImport__WindowSeconds: 60
      KrsImport__HourlyRequestLimit: ${KRS_IMPORT_HOURLY_REQUEST_LIMIT:-500}
      KrsImport__HourlyWindowSeconds: 3600
      KrsImport__MinimumRequestIntervalSeconds: ${KRS_IMPORT_MIN_INTERVAL_SECONDS:-2}
      KrsImport__LoopDelayMinutes: ${KRS_IMPORT_LOOP_DELAY_MINUTES:-60}
      KrsImport__FailureRetryDelayMinutes: ${KRS_IMPORT_FAILURE_RETRY_DELAY_MINUTES:-5}
      KrsImport__TransientBackoffBaseSeconds: ${KRS_IMPORT_BACKOFF_BASE_SECONDS:-30}
      KrsImport__TransientBackoffMaxSeconds: ${KRS_IMPORT_BACKOFF_MAX_SECONDS:-900}
      Import__Enabled: "true"
      Import__RunOnce: "false"
      Import__Source: ChangesApi
      Import__ChangesFrom: "2011-07-01"
      Import__ChangesWindowDays: 1
      Import__Resume: "true"
      Import__SkipExistingCompanies: "true"
      Import__StartPage: 1
      Import__PageLimit: 50
      Import__MaxPages: 0
      Import__MaxCompanies: 0
      Import__LoopDelayMinutes: 60
      Import__FailureRetryDelayMinutes: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ceidg-mirror-api
    profiles:
      - api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      CeidgApi__BaseUrl: https://dane.biznes.gov.pl/api/ceidg/v3/
      CeidgApi__ReportsBaseUrl: https://dane.biznes.gov.pl/raporty/
      CeidgApi__JwtToken: ${CEIDG_JWT_TOKEN:-}
      Postgres__ConnectionString: ${POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=ceidg_mirror;Username=ceidg;Password=ceidg_dev_password}
      ProductApi__FreeRegistrationTokens: 1000
      ProductApi__DefaultPageSize: 25
      ProductApi__MaxPageSize: 100
    ports:
      - "5075:8080"
    restart: unless-stopped

volumes:
  ceidg_pgdata:
